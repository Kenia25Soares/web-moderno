<!DOCTYPE html>
<html>

<head>
    <meta charset='UTF-8'>
    <title>Mini SPA</title>
    <link rel='stylesheet' href='../css/estilo.css'>
    <style>
        nav {
            font-size: 2em;
        }

        nav a {
            text-decoration: none;
            color: #FFF;
            padding: 0 10px;
        }
    </style>
</head>

<body class="conteudo">
    <nav>
        <a href wm-link="series.html" wm-destino=".pagina">Séries</a> |
        <a href wm-link="linguagens.html" wm-destino=".pagina">Linguagens</a>
    </nav>
    <div class="pagina"></div>
    <script>
        function navegarViaAjax(url, seletor, push = true) {
            if(!url || !seletor) return
            const elemento = document.querySelector(seletor)
            fetch(url)
                .then(resp => resp.text())
                .then(html => {
                    elemento.innerHTML = html
                    if(push) {
                        history.pushState({ seletor }, "Página Ajax", url)
                    }
                })
        }

        document.querySelectorAll('[wm-link]').forEach(link => {
            const url = link.attributes['wm-link'].value
            const seletorDestino = link.attributes['wm-destino'].value

            link.onclick = e => {
                e.preventDefault()
                navegarViaAjax(url, seletorDestino)
            }
        })

        // O evento popstate é que muda o estado do histórico, ou seja, quando o usuário clicar no botão de voltar ou avançar do navegador, esse evento é disparado.
        // O objeto de evento (e) tem uma propriedade state que contém o estado associado à entrada do histórico. Se e.state for verdadeiro, significa que há um estado
        // associado à entrada do histórico atual, e a função navegarViaAjax é chamada para carregar o conteúdo correspondente à URL atual (window.location.href) usando o
        //  seletor armazenado em e.state.seletor. O terceiro argumento false indica que a navegação não deve adicionar uma nova entrada ao histórico.
        window.onpopstate = e => {
            if(e.state) {
                navegarViaAjax(window.location.href, e.state.seletor, false)
            }
        }
    </script>
</body>
