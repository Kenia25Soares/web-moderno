<!DOCTYPE html>
<html>

<head>
    <meta charset='UTF-8'>
    <title>Mini SPA</title>
    <link rel='stylesheet' href='../css/estilo.css'>
    <style>
        nav {
            font-size: 2em;
        }

        nav a {
            text-decoration: none;
            color: #FFF;
            padding: 0 10px;
        }
    </style>
</head>

<body class="conteudo">
    <nav>
        <a href="series.html" wm-link="partials/series.html" wm-destino=".pagina">Séries</a> |
        <a href="linguagens.html" wm-link="partials/linguagens.html" wm-destino=".pagina">Linguagens</a>
    </nav>
    <div class="pagina"></div>
    <script>
        function urlParaFragmento(href) {
            const name = new URL(href, window.location.origin).pathname.split('/').pop() || ''
            if (name === 'series.html') return 'partials/series.html'
            if (name === 'linguagens.html') return 'partials/linguagens.html'
            return null
        }

        function navegarViaAjax(urlFragmento, seletor, push = true, historyUrl = null) {
            if(!urlFragmento || !seletor) return
            const elemento = document.querySelector(seletor)
            fetch(urlFragmento)
                .then(resp => resp.text())
                .then(html => {
                    elemento.innerHTML = html
                    if(push) {
                        history.pushState({ seletor }, "Página Ajax", historyUrl || urlFragmento)
                    }
                })
        }

        document.querySelectorAll('[wm-link]').forEach(link => {
            const urlFragmento = link.attributes['wm-link'].value
            const seletorDestino = link.attributes['wm-destino'].value
            const historyUrl = link.getAttribute('href')

            link.onclick = e => {
                e.preventDefault()
                navegarViaAjax(urlFragmento, seletorDestino, true, historyUrl)
            }
        })

        window.onpopstate = e => {
            if(e.state) {
                const fragmento = urlParaFragmento(window.location.href)
                if (fragmento) {
                    navegarViaAjax(fragmento, e.state.seletor, false)
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const fragmento = urlParaFragmento(window.location.href)
            if (fragmento) {
                navegarViaAjax(fragmento, '.pagina', false)
            }
        })
    </script>
</body>
