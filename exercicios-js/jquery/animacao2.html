        // Exercicio proposto:
         function alterarLargura(valor, duracao) {
            return new Promise(resolve => {
                $('div').animate(
                    { width: `+=${valor}` },
                    duracao,
                    resolve
                )
            })
        }

        function moverDiagonal(valor, duracao) {
            return new Promise(resolve => {
                $('div').animate(
                    { top: `+=${valor}`, left: `+=${valor}` },
                    duracao,
                    resolve
                )
            })
        }

        function girar(valor, duracao) {
            return new Promise(resolve => {
                $({ deg: 0 }).animate(
                    { deg: valor },
                    {
                        duration: duracao,
                        step: function (v) {
                            $('div').css('transform', `rotate(${v}deg)`)
                        },
                        complete: resolve
                    }
                )
            })
        }

        // versão com .then()
        alterarLargura(300, 100)
            .then(() => alterarLargura(-300, 'slow'))
            .then(() => moverDiagonal(300, 600))
            .then(() => girar(3300, 3000))
