<!DOCTYPE html>
<html>

<head>
    <meta charset='UTF-8'>
    <title>Modificando HTML #01</title>
    <link rel='stylesheet' href='css/estilo.css'>
    <script src='js/jquery.js'></script>
</head>

<body class='conteudo exercicio'>
    <h1>Modificando HTML #01</h1>
    <div id='conteudo1'></div>
    <div id='conteudo2'></div>
    <div id='conteudo3'></div>
    <div>Sem ID</div>

    <script>
        // Conteudo 1
        $('#conteudo1').append('<p>1</p>')

        // Conteudo 2
        const elementos = [
            $('<li></li>').append('Arroz'),
            $('<li>').append('Feijão'),
            $('<li>').append('Carne')
        ]

        const lista = $('<ul><li>Sorvete</li></ul>')
            .prepend(elementos)  // prepend() adiciona os elementos antes do conteúdo já existente
        $('#conteudo2').append(lista)

        // Conteudo 3
        $('#conteudo3').append(['<h1>1</h1>', '<h1>2</h1>'])
            .prepend('<h1>0</h1>')
        $('#conteudo3').html('<h1>123</h1>')
        $('#conteudo3').text('<h1>123</h1>')

        // // Alterando todos
        $('div[id]').html('<strong>Todos!</strong>')
        // $('div').html('<strong>Todos!</strong>')  // sem o seletor de atributo, o jQuery seleciona todos os elementos div, mesmo os que não possuem ID, vai aparecer o texto "Todos!"
        // // em todas as divs, inclusive na que tem a classe "conteudo exercicio" e na que tem o texto "Sem ID"

    </script>
</body>
